<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedidosAuto - Bling Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>PedidosAuto · Bling</h1>
            <p class="subtitle">Criação automática de pedidos de venda</p>
        </header>

        <!-- Configurações -->
        <section class="card" id="config-section">
            <h2>Configurações</h2>
            <div class="form-grid">
                <div class="field">
                    <label for="cfg-email">E-mail Bling</label>
                    <input id="cfg-email" type="email" autocomplete="username" placeholder="ex: usuario@empresa.com">
                </div>
                <div class="field">
                    <label for="cfg-senha">Senha Bling</label>
                    <input id="cfg-senha" type="password" autocomplete="current-password" placeholder="••••••••">
                </div>
                <div class="field field-full">
                    <label for="cfg-cliente">Cliente (autocomplete)</label>
                    <input id="cfg-cliente" type="text" placeholder="ENVIO FULL ML">
                </div>
                <div class="field">
                    <label for="cfg-loja">Loja</label>
                    <input id="cfg-loja" type="text" placeholder="Loja Full">
                </div>
                <div class="field">
                    <label for="cfg-frete">Frete por conta</label>
                    <input id="cfg-frete" type="text" placeholder="9 - Sem Ocorrência de Transporte">
                </div>
            </div>
            <label class="checkbox">
                <input id="cfg-remember" type="checkbox">
                <span>Lembrar nesta máquina (salva no navegador)</span>
            </label>
            <p class="hint">Campos vazios usam os valores do <code>.env</code> ou os padrões.</p>
        </section>

        <!-- Upload -->
        <section class="card" id="upload-section">
            <h2>Enviar planilha</h2>
            <form id="upload-form">
                <label class="drop-area" id="drop-area">
                    <input type="file" id="file-input" name="planilha" accept=".xlsx,.xls" hidden>
                    <div class="drop-content">
                        <span class="drop-icon">↥</span>
                        <span class="drop-text">Arraste o arquivo <strong>.xlsx</strong> ou clique para selecionar</span>
                    </div>
                </label>
                <div id="file-name" class="file-name hidden"></div>
                <button type="submit" id="btn-start" class="btn btn-primary" disabled>
                    Iniciar processamento
                </button>
            </form>
        </section>

        <!-- Progresso -->
        <section class="card hidden" id="progress-section">
            <div class="progress-header">
                <h2>Progresso</h2>
                <div class="log-actions">
                    <button id="btn-clear-log" type="button" class="btn btn-secondary btn-sm">Limpar</button>
                    <button id="btn-download-log" type="button" class="btn btn-secondary btn-sm">Baixar log</button>
                    <button id="btn-cancel" type="button" class="btn btn-danger btn-sm">Cancelar</button>
                </div>
            </div>
            <div id="log-container" class="log-container">
                <div id="log-content"></div>
            </div>
        </section>

        <!-- Resultado -->
        <section class="card hidden" id="result-section">
            <h2>Resultado</h2>
            <p id="result-summary"></p>
            <a id="btn-download" class="btn btn-success" href="#" download>
                Baixar planilha de resultado
            </a>
            <button id="btn-new" class="btn btn-secondary">Novo upload</button>
        </section>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const fileName = document.getElementById('file-name');
        const btnStart = document.getElementById('btn-start');
        const btnCancel = document.getElementById('btn-cancel');
        const btnClearLog = document.getElementById('btn-clear-log');
        const btnDownloadLog = document.getElementById('btn-download-log');
        const btnDownload = document.getElementById('btn-download');
        const btnNew = document.getElementById('btn-new');

        const cfgEmail   = document.getElementById('cfg-email');
        const cfgSenha   = document.getElementById('cfg-senha');
        const cfgCliente = document.getElementById('cfg-cliente');
        const cfgLoja    = document.getElementById('cfg-loja');
        const cfgFrete   = document.getElementById('cfg-frete');
        const cfgRemember = document.getElementById('cfg-remember');

        // ── Persistência local das configurações ──
        const STORAGE_KEY = 'pedidosauto_cfg_v1';
        (function loadCfg() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const cfg = JSON.parse(raw);
                if (cfg.email)   cfgEmail.value   = cfg.email;
                if (cfg.senha)   cfgSenha.value   = cfg.senha;
                if (cfg.cliente) cfgCliente.value = cfg.cliente;
                if (cfg.loja)    cfgLoja.value    = cfg.loja;
                if (cfg.frete)   cfgFrete.value   = cfg.frete;
                cfgRemember.checked = true;
            } catch (e) { /* ignora */ }
        })();

        function persistCfg() {
            if (cfgRemember.checked) {
                const cfg = {
                    email:   cfgEmail.value.trim(),
                    senha:   cfgSenha.value,
                    cliente: cfgCliente.value.trim(),
                    loja:    cfgLoja.value.trim(),
                    frete:   cfgFrete.value.trim(),
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        }
        cfgRemember.addEventListener('change', persistCfg);
        const uploadSection = document.getElementById('upload-section');
        const progressSection = document.getElementById('progress-section');
        const resultSection = document.getElementById('result-section');
        const logContent = document.getElementById('log-content');
        const logContainer = document.getElementById('log-container');
        const resultSummary = document.getElementById('result-summary');
        const uploadForm = document.getElementById('upload-form');

        let selectedFile = null;

        // ── Drag & Drop ──
        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
        dropArea.addEventListener('drop', e => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                selectedFile = e.dataTransfer.files[0];
                showFile(selectedFile);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                selectedFile = fileInput.files[0];
                showFile(selectedFile);
            }
        });

        function showFile(file) {
            fileName.textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            fileName.classList.remove('hidden');
            btnStart.disabled = false;
        }

        // ── Upload & Start ──
        uploadForm.addEventListener('submit', async e => {
            e.preventDefault();
            if (!selectedFile) return;

            btnStart.disabled = true;
            btnStart.textContent = 'Enviando…';

            persistCfg();

            const formData = new FormData();
            formData.append('planilha', selectedFile);
            formData.append('email',   cfgEmail.value.trim());
            formData.append('senha',   cfgSenha.value);
            formData.append('cliente', cfgCliente.value.trim());
            formData.append('loja',    cfgLoja.value.trim());
            formData.append('frete',   cfgFrete.value.trim());

            try {
                const resp = await fetch('/upload', { method: 'POST', body: formData });
                const data = await resp.json();

                if (!resp.ok) {
                    alert(data.error || 'Erro ao enviar arquivo.');
                    btnStart.disabled = false;
                    btnStart.textContent = 'Iniciar processamento';
                    return;
                }

                // Mostra progresso
                progressSection.classList.remove('hidden');
                resultSection.classList.add('hidden');
                logContent.innerHTML = '';
                startSSE();

            } catch (err) {
                alert('Erro de conexão: ' + err.message);
                btnStart.disabled = false;
                btnStart.textContent = 'Iniciar processamento';
            }
        });

        // ── SSE (Server-Sent Events) ──
        function startSSE() {
            const source = new EventSource('/stream');

            source.onmessage = function(e) {
                const msg = e.data.replace(/\\n/g, '\n');
                if (msg.trim() === 'DONE') {
                    appendLog('🔚 Processo finalizado.');
                    source.close();
                    btnStart.textContent = 'Iniciar processamento';
                    btnStart.disabled = false;
                    return;
                }
                appendLog(msg);
            };

            source.addEventListener('result', function(e) {
                const filename = e.data;
                resultSection.classList.remove('hidden');
                btnDownload.href = `/download/${filename}`;
                resultSummary.textContent = `Arquivo gerado: ${filename}`;
            });

            source.onerror = function() {
                source.close();
                appendLog('⚠️ Conexão com o servidor perdida.');
                btnStart.textContent = 'Iniciar processamento';
                btnStart.disabled = false;
            };
        }

        function appendLog(msg) {
            const line = document.createElement('div');
            line.className = 'log-line';

            if (msg.includes('❌') || msg.includes('ERRO') || msg.includes('Erro')) {
                line.classList.add('log-error');
            } else if (msg.includes('⚠️')) {
                line.classList.add('log-warn');
            } else if (msg.includes('✅')) {
                line.classList.add('log-success');
            }

            line.textContent = msg;
            logContent.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // ── Cancelar ──
        btnCancel.addEventListener('click', async () => {
            if (!confirm('Deseja realmente cancelar a execução?')) return;
            await fetch('/cancelar', { method: 'POST' });
            appendLog('🛑 Cancelamento solicitado...');
        });

        // ── Limpar log ──
        btnClearLog.addEventListener('click', () => {
            logContent.innerHTML = '';
        });

        // ── Baixar log ──
        btnDownloadLog.addEventListener('click', () => {
            const linhas = Array.from(logContent.querySelectorAll('.log-line'))
                .map(l => l.textContent);
            if (linhas.length === 0) {
                alert('Nenhum log para baixar.');
                return;
            }
            const blob = new Blob([linhas.join('\n')], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pedidos-auto_log_${ts}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // ── Novo Upload ──
        btnNew.addEventListener('click', () => {
            resultSection.classList.add('hidden');
            progressSection.classList.add('hidden');
            logContent.innerHTML = '';
            fileName.classList.add('hidden');
            selectedFile = null;
            fileInput.value = '';
            btnStart.disabled = true;
            btnStart.textContent = 'Iniciar processamento';
        });
    </script>
</body>
</html>
